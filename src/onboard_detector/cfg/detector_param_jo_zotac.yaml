detector_node:
  ros__parameters:
    onboard_detector:
      
      localization_mode: 0 # 0: pose (default) 1: odom

      # ROS Topics
      depth_image_topic: /front_camera/camera/depth/image_rect_raw
      color_image_topic: /front_camera/camera/color/image_raw
      lidar_pointcloud_topic: /velodyne_points
      pose_topic: /glim_ros/lidar_pose
      odom_topic: /odom
      use_tf_pose: true
      tf_map_frame: map
      tf_lidar_frame: velodyne
      tf_depth_frame: camera_refined
      tf_color_frame: camera_refined
      urdf_camera_frame: camera
      camera_frame_initial_guess: camera_initial_guess
      output_detected_image_topic: /onboard_detector/detected_image
      output_detected_bboxes_topic: /onboard_detector/detected_bounding_boxes
      output_obstacles_topic: /onboard_detector/obstacles         

      # Camera Parameters
      depth_intrinsics: [436.9647521972656, 436.9647521972656, 431.9205627441406, 240.13380432128906] # fx, fy, cx, cy - from actual camera calibration
      color_intrinsics: [645.0390014648438, 644.30419921875, 653.908203125, 365.65606689453125] # fx, fy, cx, cy
      depth_scale_factor: 1000.0 # 1000 for Intel Realsense Camera
      depth_min_value: 0.5
      depth_max_value: 4.5
      depth_filter_margin: 10 # filter
      depth_skip_pixel: 2  # filter
      image_cols: 848 #depth_image_width
      image_rows: 480 #depth_image_cols

      # System
      time_step: 0.12

      # DBSCAN Common
      voxel_size: 0.1 # Size of voxel grid for filtering (meters)
      ground_height: -0.7 # height of ground to remove ground points
      roof_height: 4.0 # relative height of roof to remove roof points

      # DBSCAN visual param
      voxel_occupied_thresh: 5.0 # min num of points for a voxel to be occupied in voxel filter
      dbscan_min_points_cluster: 20 # 20: 4.0m range; 30: 3.5m range 40: 3.0m range
      dbscan_search_range_epsilon: 0.05 # searching range radius

      # DBSCAN LiDAR param
      lidar_DBSCAN_min_points: 14       # ↑ meno rumore
      lidar_DBSCAN_epsilon: 0.08        # ok così

      downsample_threshold: 3500
      gaussian_downsample_rate: 8

      # DBSCAN refinement param
      dbscan_refinement_enable: true
      dbscan_refine_max_diagonal: 2.5      # Allow large boxes if density is high
      dbscan_refine_min_density: 120.0     # Require high density for large boxes
      dbscan_refine_split_min_pts: 10
      dbscan_refine_split_eps: 0.07
      dbscan_refine_min_subcluster_pts: 12
      dbscan_refine_axis_slice_width: 0.25
      dbscan_refine_max_depth: 3
      dbscan_refine_recursive: true
      dbscan_refine_min_box_volume: 0.0001


      # LiDAR Visual Filtering
      visual_filtering_BBox_IOU_threshold: 0.4
      visual_filtering_BBox_IOV_threshold: 0.5

      lidar_visual_filtering_BBox_IOU_threshold: 0.3
      lidar_visual_filtering_BBox_IOV_threshold: 0.4

      samegroupIOU_threshold: 0.4 # threshold for merging boxes in the same group (for debugging)
      samegroupIOV_threshold: 0.5 # threshold for merging boxes in the same group (for debugging)

      visual_merging_flag: "smaller" # "smaller": keep smaller box; "bigger": keep bigger box; "none": do not merge
      uv_unmerged_flag: false # whether to visualize unmerged boxes (for debugging);
      db_unmerged_flag: true # whether to visualize unmerged boxes (for debugging);
      lidar_visual_merging_flag: "smaller" # "smaller": keep smaller box; "bigger": keep bigger box; "none": do not merge
      visual_unmerged_flag: true # discard or not visual boxes that don't have enough overlap with LiDAR boxes (for debugging)
      lidar_unmerged_flag: true # whether to visualize unmerged boxes (for debugging);

      # Sensor and LiDAR Ranges
      local_sensor_range: [10.0, 10.0, 5.0] # x, y, z range for generic sensor (meters)
      local_lidar_range: [10.0, 10.0, 5.0] # x, y, z range for LiDAR (meters)

      # Tracking and data association
      max_match_range: 2.0 # max match range between time steps in meters
      max_size_diff_range: 2.0 #  in meter
      feature_weight: [3.0, 3.0, 0.1, 0.5, 0.5, 0.05, 0.05, 0.05, 0.01] # weight for feagent 3pos + 3size +  3 pc centroid
      history_size: 100 # size of tracking history. history[0] is current detection
      fix_size_history_threshold: 20 # History threshold (num of frames) to fix box size
      fix_size_dimension_threshold: 0.4 # dimension threshold (size of proportional) to fix box size
      kalman_filter_param: [0.25, 0.01, 0.05, 0.05, 0.04, 0.3, 0.6]
      # kalman_filter_param_vel: [0.25, 0.02, 0.1, 0.2, 0.05]
      kalman_filter_averaging_frames: 10
      max_missed_frames: 5
      match_feat_weight: 1.0
      match_pos_weight: 1.5
      match_pc_weight: 1.0
      match_size_weight: 1.0
      match_iou_weight: 1.0
      match_cluster_weight: 0.8
      match_vel_weight: 1.0

      min_match_score: -2.5

      new_track_min_dist: 0.8
      new_track_min_pc_dist: 1.0
      max_match_vel_diff: 3.0

      duplicate_track_dist_thresh: 0.8
      duplicate_track_iou2d_thresh: 0.25
      duplicate_size_rel_thresh: 0.6  
      shape_score_weight: 0.02
      enable_tracking_debug_logs: true

      # Association robustness
      max_match_speed: 8.0
      match_pos_score_weight: 1.0
      match_size_score_weight: 0.35
      match_iou2d_score_weight: 0.15
      max_relative_size_diff_match: 0.60
      match_velocity_direction_score_weight: 0.12
      match_prev_obs_pos_score_weight: 0.25
      match_prev_obs_iou2d_score_weight: 0.10
      static_assoc_speed_thresh: 0.35
      static_assoc_dist_thresh: 0.45
      dynamic_assoc_dist_base: 0.60
      dynamic_assoc_dist_gain: 1.20
      dynamic_assoc_dist_max: 2.50
      static_assoc_min_iou2d: 0.08
      assoc_max_rel_size_diff: 0.75
      match_feat_score_weight: 0.15
      match_iou2d_weight: 0.20

      # Track confirmation / natural motion
      min_confirm_hits: 3
      min_natural_motion_dist: 0.08
      max_natural_motion_dist: 1.50
      max_natural_innovation: 0.60
      min_direction_consistency_cos: -0.20
      min_velocity_for_direction_check: 0.10
      max_velocity_direction_error_confirm: 1.20
      max_velocity_direction_error_tracked: 2.50
      stationary_speed_thresh: 0.10
      confirmed_track_assoc_bonus: 0.20
      dynamic_track_assoc_bonus: 0.25
      max_natural_innovation_confirmed: 1.00
      max_natural_innovation_dynamic: 1.20
      max_velocity_direction_error_confirm_dynamic: 2.20
      max_velocity_direction_error_tracked_dynamic: 4.00
      min_match_score_confirmed: -1.20
      min_match_score_dynamic: -1.50

      # YOLO Dynamic Classification (depth-projected point cloud)
      yolo_dynamic_classes: [person, car, bus, truck, motorbike, bicycle, dog, cat, horse, cow, sheep]
      yolo_point_fraction_threshold: 0.15 # min fraction of filtered YOLO points inside a bbox to mark it dynamic
      yolo_depth_tolerance: 1.0            # [m] max depth beyond foreground to keep (background filter)


      # Classification
      frame_skip: 5 # num of frames skiped when comparing 2 point clouds
      dynamic_velocity_threshold: 0.3
      dynamic_voting_threshold: 0.8
      frames_force_dynamic: 22 # Range of searching dynamic obstacles in box history
      frames_force_dynamic_check_range: 30 # threshold for forcing dynamic obstacles
      dynamic_consistency_threshold: 20 # obstacles being voted as dynamic for continuous k frames are eligible to be classified as dynamic

      # Constrain size
      target_constrain_size: false
      target_object_size: [0.5, 0.5, 1.8]
      max_object_size: [10.0, 10.0, 10.0] # filter out objects that are too large

calibration_icp_node:
  ros__parameters:
    depth_topic: /front_camera/camera/depth/image_rect_raw
    velodyne_topic: /velodyne_points
    lidar_frame: velodyne
    urdf_camera_frame: camera
    camera_frame_initial_guess: camera_initial_guess
    refined_camera_frame: camera_refined
    icp_max_correspondence_distance: 0.2
    icp_max_iteration: 100
    icp_voxel_size: 0.05
    icp_use_point_to_plane: false
    icp_normal_radius: 0.15
    icp_normal_max_nn: 30
    min_overlap_points: 100
    overlap_fov_margin_px: 120
    icp_max_runs: 10         # Number of ICP runs (tunable)
    icp_fitness_threshold: 0.3 # Minimum fitness for valid ICP result (tunable)
    onboard_detector:
      depth_intrinsics: [436.9647521972656, 436.9647521972656, 431.9205627441406, 240.13380432128906]
      depth_scale_factor: 1000.0
      depth_min_value: 0.5
      depth_max_value: 5.0
      depth_skip_pixel: 2

yolov11_detector_node:
  ros__parameters:
    image_topic: /front_camera/camera/color/image_raw
    detected_image_topic: yolo_detector/detected_image
    detected_bboxes_topic: yolo_detector/detected_bounding_boxes
    inference_time_topic: yolo_detector/yolo_time
    weights_path: weights/yolo11n.pt
    class_names_path: config/coco.names
    target_classes: [person, car, bus, truck, motorbike, bicycle, dog, cat, horse, cow, sheep]
    timer_period_sec: 0.033
    inference_size: 352
    queue_size: 10

